<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oracle Office — WASM Bridge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; }
        #agent-popup {
            position: fixed; pointer-events: auto; z-index: 30;
            opacity: 0; transition: opacity 0.15s ease;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
        }
        #agent-popup.visible { opacity: 1; }
    </style>
</head>
<body>
    <div id="overlay"></div>
    <div id="agent-popup"></div>
    <canvas id="glcanvas" tabindex="1"></canvas>

    <!-- Macroquad runtime -->
    <script src="/wasm-office/mq_js_bundle.js"></script>
    <script>load("/wasm-office/oracle-office.wasm");</script>

    <!-- Bridge: connect JS data to WASM canvas -->
    <script type="module">
    import { startDataLoop } from '/wasm-office/lib/data-loop.js';
    import { startPopupLoop } from '/wasm-office/lib/popup.js';

    // Wait for Macroquad to expose wasm_exports
    const ready = setInterval(() => {
        if (typeof wasm_exports !== 'undefined' && wasm_exports.wasm_push_agents) {
            clearInterval(ready);
            console.log('[bridge] WASM ready — starting data + popup loops');
            startDataLoop(wasm_exports);
            startPopupLoop(wasm_exports);
        }
    }, 100);
    </script>
</body>
</html>
