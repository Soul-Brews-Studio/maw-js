name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test:all

      - name: Build CLI
        run: bun run build

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/maw
