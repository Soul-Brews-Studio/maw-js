# Declare `sanitizeLogField(value)` from src/core/util/sanitize-log.ts as a
# taint sanitizer for the `js/log-injection` flow label. This closes the
# log-injection bucket of #474 — the 4 call sites in
# src/transports/hub-connection.ts (L57, L87, L91, L101) wrap untrusted
# WS-frame fields in this function before logging.
#
# See docs/security/codeql-sanitizer-model.md for rationale and fallback
# plan (inline `// lgtm[js/log-injection]` on those 4 lines) if this
# extensible-predicate shape stops taking effect in a future CodeQL
# release.
#
# Row schema for `sanitizerModel` (JS):
#   [ package, type, subtypes, name, signature, ext, input, kind, provenance ]

extensions:
  - addsTo:
      pack: codeql/javascript-all
      extensible: sanitizerModel
    data:
      - ["sanitize-log", "", false, "sanitizeLogField", "", "", "Argument[0]", "log-injection", "manual"]
